services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    develop:
      watch:
        - action: rebuild
          path: ./backend
          ignore:
            - node_modules/
            - dist/
            - .git/
            - .next/
  backend-fastapi:
    build: ./playground-fastapi
    ports:
      - "8001:8001"
    env_file:
      - ./playground-fastapi/.env
    develop:
      watch:
        - action: rebuild
          path: ./playground-fastapi
  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    environment:
      INTERNAL_API_URL: http://backend:3001
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ./client
          ignore:
            - node_modules/
            - .next/
            - .git/

  langgraph:
    build: ./LangGraph
    ports:
      - "8000:8000"

