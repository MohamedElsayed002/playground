services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    environment:
      INTERNAL_API_URL: http://backend:3001
    depends_on:
      - backend

  langgraph:
    build: ./LangGraph
    ports:
      - "8000:8000"

