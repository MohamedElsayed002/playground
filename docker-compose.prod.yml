services:
  backend:
    image: mosayed2002/playground-backend:${IMAGE_TAG:-latest}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  client:
    image: mosayed2002/playground-client:${IMAGE_TAG:-latest}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:3001
    env_file:
      - ./client/.env

  langgraph:
    image: mosayed2002/playground-langgraph:${IMAGE_TAG:-latest}
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "8000:8000"

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --interval 60 --cleanup