services:
  backend:
    image: mosayed2002/playground-backend:latest
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  client:
    image: mosayed2002/playground-client:latest
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:3001
    env_file:
      ./client/.env

  langgraph:
    image: mosayed2002/playground-langgraph:latest
    ports:
      - "8000:8000"